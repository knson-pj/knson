<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부동산 물건 관리 시스템 | 담당자</title>
  <meta name="supabase-url" content="" />
  <meta name="supabase-anon-key" content="" />

  <style>html{visibility:hidden;}</style>
  <script>
    (function(){
      try{
        var raw = null;
        try { raw = sessionStorage.getItem('knson_bms_session_v1'); } catch(e) {}
        try { localStorage.removeItem('knson_bms_session_v1'); } catch(e) {}
        var s = raw ? JSON.parse(raw) : null;
        if (!s || !s.token || !s.user) {
          location.replace('./login.html?next=' + encodeURIComponent('./agent-index.html'));
          return;
        }
        // 관리자가 접근하면 관리자 페이지로 리다이렉트
        var role = String(s.user.role || '').trim().toLowerCase();
        if (role === 'admin') {
          location.replace('./admin-index.html');
          return;
        }
      }catch(e){
        location.replace('./login.html?next=' + encodeURIComponent('./agent-index.html'));
        return;
      }
      document.documentElement.style.visibility = 'visible';
    })();
  </script>

  <link rel="stylesheet" href="./admin-styles.css?v=20260320-agent" />
</head>
<body>
  <div class="admin-shell">
    <header class="admin-topbar">
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <h1>담당자 페이지</h1>
          <p>배정된 물건을 관리합니다.</p>
        </div>
      </div>

      <div class="top-actions">
        <span id="agentUserBadge" class="badge badge-agent">담당자</span>
        <button id="btnChangeMyPassword" class="btn btn-secondary hidden">비밀번호 변경</button>
        <button id="btnAgentLogout" class="btn btn-ghost hidden">로그아웃</button>
      </div>
    </header>
    <div id="globalMsg" class="global-msg hidden"></div>

    <main class="admin-main">
      <!-- 요약 -->
      <section class="panel summary-panel">
        <div class="summary-grid">
          <div class="summary-card summary-total" data-card="all"><span>전체 물건</span><strong id="agSumTotal">0</strong></div>
          <div class="summary-card summary-auction" data-card="auction"><span>경매</span><strong id="agSumAuction">0</strong></div>
          <div class="summary-card summary-gongmae" data-card="onbid"><span>공매</span><strong id="agSumGongmae">0</strong></div>
          <div class="summary-card summary-naver-realtor" data-card="realtor_naver"><span>네이버중개</span><strong id="agSumNaverRealtor">0</strong></div>
          <div class="summary-card summary-direct-realtor" data-card="realtor_direct"><span>일반중개</span><strong id="agSumDirectRealtor">0</strong></div>
          <div class="summary-card summary-general" data-card="general"><span>일반</span><strong id="agSumGeneral">0</strong></div>
        </div>
      </section>

      <!-- 물건 관리 -->
      <section class="panel">
        <div class="panel-title-row">
          <h2>전체 현황</h2>
        </div>

        <div class="toolbar">
          <select id="agStatusFilter" class="select">
            <option value="">전체 상태</option>
            <option value="active">진행중</option>
            <option value="hold">보류</option>
            <option value="closed">종결</option>
            <option value="review">검토중</option>
          </select>

          <select id="agAreaFilter" class="select">
            <option value="">전체 면적</option>
            <option value="0-5">5평 미만</option>
            <option value="5-10">5~10평</option>
            <option value="10-20">10~20평</option>
            <option value="20-30">20~30평</option>
            <option value="30-50">30~50평</option>
            <option value="50-">50평 이상</option>
          </select>

          <select id="agPriceFilter" class="select">
            <option value="">전체 가격</option>
            <option value="0-1">1억 미만</option>
            <option value="1-3">1~3억</option>
            <option value="3-5">3~5억</option>
            <option value="5-10">5~10억</option>
            <option value="10-20">10~20억</option>
            <option value="20-">20억 이상</option>
          </select>

          <select id="agRatioFilter" class="select">
            <option value="">전체 비율</option>
            <option value="50">50% 이하</option>
          </select>

          <input id="agKeyword" class="input" type="text" placeholder="주소 / 지역 검색" />
          <button id="agFavFilter" class="btn-add-circle btn-fav-circle" type="button" title="관심물건만 보기">★</button>
          <button id="btnNewProperty" class="btn-add-circle" type="button" title="신규 물건 등록">+</button>
        </div>

        <div class="table-wrap">
          <table class="table" id="agPropertiesTable">
            <thead>
              <tr>
                <th class="fav-col"></th>
                <th>물건번호</th>
                <th>구분</th>
                <th>주소</th>
                <th>유형</th>
                <th>층수</th>
                <th>전용면적(평)</th>
                <th>감정가(매각가)</th>
                <th>현재가격</th>
                <th>비율</th>
                <th>주요일정</th>
                <th>진행상태</th>
                <th>권리분석</th>
                <th>현장실사</th>
                <th>의견</th>
              </tr>
            </thead>
            <tbody id="agTableBody"></tbody>
          </table>
          <div id="agEmpty" class="empty hidden">배정된 물건이 없습니다.</div>
        </div>
        <div id="agPagination" class="pager"></div>
      </section>
    </main>
  </div>

  <!-- 물건 편집 모달 (제한적) -->
  <div id="agEditModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>물건 정보 수정</h3>
        <button id="agEditClose" class="icon-btn" aria-label="닫기">✕</button>
      </div>
      <form id="agEditForm" class="modal-body">
        <div class="grid2">
          <label class="field"><span>물건번호</span><input name="itemNo" class="input" type="text" disabled /></label>
          <label class="field"><span>구분</span><input name="sourceType" class="input" type="text" disabled /></label>
        </div>

        <label class="field"><span>주소</span><input name="address" class="input" type="text" disabled /></label>

        <div class="grid2">
          <label class="field"><span>세부유형</span><input name="assetType" class="input" type="text" /></label>
          <label class="field"><span>진행상태</span><input name="status" class="input" type="text" /></label>
        </div>

        <div class="grid2">
          <label class="field"><span>권리분석</span><input name="rightsAnalysis" class="input" type="text" /></label>
          <label class="field"><span>현장실사</span><input name="siteInspection" class="input" type="text" /></label>
        </div>

        <label class="field">
          <span>의견</span>
          <textarea name="opinion" class="input" rows="3"></textarea>
        </label>

        <div class="modal-actions">
          <button id="agEditSave" class="btn btn-primary" type="submit">저장</button>
          <button id="agEditCancel" class="btn btn-ghost" type="button">취소</button>
        </div>
        <div id="agEditMsg" class="note"></div>
      </form>
    </div>
  </div>

  <!-- 신규 물건 등록 모달 -->
  <div id="newPropertyModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>신규 물건 등록</h3>
        <button id="npmClose" class="icon-btn" aria-label="닫기">✕</button>
      </div>
      <form id="newPropertyForm" class="modal-body" autocomplete="off">

        <div class="field npm-type-switch" role="radiogroup" aria-label="등록자 유형">
          <span class="field-label">등록자 유형 *</span>
          <div class="npm-type-options">
            <label class="npm-type-card is-active">
              <input type="radio" name="submitterKind" value="realtor" checked />
              <strong>공인중개사</strong>
              <small>공인중개사 관련 등록물</small>
            </label>
            <label class="npm-type-card">
              <input type="radio" name="submitterKind" value="owner" />
              <strong>소유자 / 일반</strong>
              <small>공인중개사와 관련없는 일반 등록물</small>
            </label>
          </div>
        </div>

        <label class="field">
          <span>주소 *</span>
          <input name="address" class="input" type="text" required placeholder="예: 서울특별시 강남구 역삼동 ..." />
        </label>

        <div class="grid2">
          <label class="field">
            <span>세부유형 *</span>
            <input name="assetType" class="input" type="text" required placeholder="예: 아파트, 오피스텔" />
          </label>
          <label class="field">
            <span>매매가(원) *</span>
            <input name="priceMain" class="input" type="number" min="0" step="10000" required placeholder="예: 580000000" />
          </label>
        </div>

        <div class="grid3">
          <label class="field">
            <span>해당층</span>
            <input name="floor" class="input" type="text" placeholder="예: 5 / B1" />
          </label>
          <label class="field">
            <span>총층</span>
            <input name="totalfloor" class="input" type="text" placeholder="예: 15" />
          </label>
          <label class="field">
            <span>사용승인일</span>
            <input name="useapproval" class="input" type="date" />
          </label>
        </div>

        <div class="grid3">
          <label class="field">
            <span>공용면적(평)</span>
            <input name="commonarea" class="input" type="number" min="0" step="0.01" placeholder="예: 10.52" />
          </label>
          <label class="field">
            <span>전용면적(평)</span>
            <input name="exclusivearea" class="input" type="number" min="0" step="0.01" placeholder="예: 18.34" />
          </label>
          <label class="field">
            <span>토지면적(평)</span>
            <input name="sitearea" class="input" type="number" min="0" step="0.01" placeholder="예: 42.10" />
          </label>
        </div>

        <div id="npmRealtorFields">
          <div class="npm-sub-title">중개사 정보</div>
          <div class="grid2">
            <label class="field">
              <span>중개사무소명 *</span>
              <input name="realtorname" class="input" type="text" placeholder="예: 한빛공인중개사사무소" />
            </label>
            <label class="field">
              <span>유선전화</span>
              <input name="realtorphone" class="input" type="tel" placeholder="예: 02-1234-5678" />
            </label>
          </div>
          <div class="grid2" style="margin-top:10px;">
            <label class="field">
              <span>휴대폰번호 *</span>
              <input name="realtorcell" class="input" type="tel" placeholder="010-0000-0000" />
            </label>
          </div>
        </div>

        <div id="npmOwnerFields" class="hidden">
          <div class="npm-sub-title">소유자 / 일반 등록자 정보</div>
          <div class="grid2">
            <label class="field">
              <span>이름 *</span>
              <input name="submitterName" class="input" type="text" placeholder="예: 홍길동" />
            </label>
            <label class="field">
              <span>연락처 *</span>
              <input name="submitterPhone" class="input" type="tel" placeholder="010-0000-0000" />
            </label>
          </div>
        </div>

        <label class="field">
          <span>의견</span>
          <textarea name="opinion" class="input" rows="3" placeholder="추가 설명이 있으면 입력해 주세요."></textarea>
        </label>

        <div class="modal-actions">
          <button id="npmSave" class="btn btn-primary" type="submit">등록</button>
          <button id="npmCancel" class="btn btn-ghost" type="button">취소</button>
        </div>
        <div id="npmMsg" class="note"></div>
      </form>
    </div>
  </div>

  <!-- 내 비밀번호 변경 -->
  <div id="passwordChangeModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card modal-card-sm">
      <div class="modal-header">
        <h3>비밀번호 변경</h3>
        <button id="pwdModalClose" class="icon-btn" aria-label="닫기">✕</button>
      </div>
      <form id="passwordChangeForm" class="modal-body">
        <label class="field"><span>새 비밀번호</span><input name="newPassword" class="input" type="password" minlength="8" autocomplete="new-password" required /></label>
        <label class="field"><span>새 비밀번호 확인</span><input name="confirmPassword" class="input" type="password" minlength="8" autocomplete="new-password" required /></label>
        <div class="modal-actions">
          <button id="pwdSave" class="btn btn-primary" type="submit">변경</button>
          <button id="pwdCancel" class="btn btn-ghost" type="button">취소</button>
        </div>
        <div id="pwdMsg" class="note"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./knson-core.js?v=20260320-agent"></script>
  <script src="./agent-app.js?v=20260320-fix2"></script>
</body>
</html>
