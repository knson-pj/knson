<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>누구나 매물 등록 | 부동산 통합 관리 시스템</title>
  <meta name="supabase-url" content="" />
  <meta name="supabase-anon-key" content="" />
  <link rel="stylesheet" href="./general-register.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="dot"></div>
      <div>
        <div class="brand-title">누구나 매물 등록</div>
        <div class="brand-sub">등록자 유형에 따라 입력폼이 바뀝니다.</div>
      </div>
    </div>

    <nav class="actions">
      <a class="btn btn-ghost" href="./login.html">로그인으로</a>
      <a class="btn btn-secondary" href="./index.html">메인으로</a>
    </nav>
  </header>

  <main class="wrap">
    <section id="viewForm" class="card">
      <h1 class="h1">매물 정보 입력</h1>
      <p class="muted">누구나 등록할 수 있는 페이지입니다. <strong>중개</strong>는 공인중개사 관련 등록물, <strong>일반</strong>은 공인중개사와 관련없는 일반 등록물로 분류됩니다.</p>

            <form id="generalForm" class="form">
        <div class="field full type-switch" role="radiogroup" aria-label="등록자 유형">
          <span>등록자 유형 *</span>
          <div class="type-options">
            <label class="type-card is-active">
              <input type="radio" name="submitterKind" value="realtor" checked />
              <strong>공인중개사</strong>
              <small>공인중개사 관련 등록물</small>
            </label>
            <label class="type-card">
              <input type="radio" name="submitterKind" value="owner" />
              <strong>소유자 / 일반</strong>
              <small>공인중개사와 관련없는 일반 등록물</small>
            </label>
          </div>
        </div>

        <label class="field full">
          <span>물건 주소 *</span>
          <input name="address" type="text" required placeholder="예: 서울특별시 강남구 역삼동 ..." />
        </label>

        <div class="grid2 full">
          <label class="field">
            <span>부동산유형 *</span>
            <input name="assetType" type="text" required placeholder="예: 아파트, 오피스텔, 근린생활시설" />
          </label>
          <label class="field">
            <span>기준금액(원) *</span>
            <input name="priceMain" type="number" min="0" step="10000" required placeholder="예: 580000000" />
          </label>
        </div>

        <div class="grid3 full">
          <label class="field">
            <span>공용면적(평)</span>
            <input name="exclusiveArea" type="number" min="0" step="0.01" placeholder="예: 10.52" />
          </label>
          <label class="field">
            <span>전용면적(평)</span>
            <input name="commonArea" type="number" min="0" step="0.01" placeholder="예: 18.34" />
          </label>
          <label class="field">
            <span>토지면적(평)</span>
            <input name="siteArea" type="number" min="0" step="0.01" placeholder="예: 42.10" />
          </label>
        </div>

        <div class="grid2 full">
          <label class="field">
            <span>사용승인일</span>
            <input name="useApproval" type="date" />
          </label>
          <label class="field">
            <span>원문 링크</span>
            <input name="sourceUrl" type="url" placeholder="https://" />
          </label>
        </div>

        <section class="sub-section full" id="realtorFields">
          <h2>공인중개사 정보</h2>
          <div class="grid2">
            <label class="field">
              <span>중개사무소명 *</span>
              <input name="brokerOfficeName" type="text" placeholder="예: 한빛공인중개사사무소" />
            </label>
            <label class="field">
              <span>공인중개사명 *</span>
              <input name="brokerName" type="text" placeholder="예: 홍길동" />
            </label>
          </div>
          <div class="grid2">
            <label class="field">
              <span>등록번호</span>
              <input name="brokerLicenseNo" type="text" placeholder="예: 12345-2026-00001" />
            </label>
            <label class="field">
              <span>연락처 *</span>
              <input name="submitterPhoneRealtor" type="tel" placeholder="010-0000-0000" />
            </label>
          </div>
        </section>

        <section class="sub-section full hidden" id="ownerFields">
          <h2>소유자 / 일반 등록자 정보</h2>
          <div class="grid2">
            <label class="field">
              <span>이름 *</span>
              <input name="submitterNameOwner" type="text" placeholder="예: 홍길동" />
            </label>
            <label class="field">
              <span>연락처 *</span>
              <input name="submitterPhoneOwner" type="tel" placeholder="010-0000-0000" />
            </label>
          </div>
        </section>

        <label class="field full">
          <span>메모 / 매물특징</span>
          <textarea name="memo" rows="4" placeholder="추가 설명이 있으면 입력해 주세요."></textarea>
        </label>

        <div class="row full">
          <button id="btnSubmit" type="submit" class="btn btn-primary">등록 요청하기</button>
        </div>

        <div id="msg" class="msg" role="status" aria-live="polite"></div>
      </form>
    </section>

    <section id="viewDone" class="card done hidden">
      <div class="check">✓</div>
      <h2>등록이 접수되었습니다</h2>
      <p>검토후 연락드리겠습니다.</p>
      <div class="row">
        <a class="btn btn-primary" href="./login.html">로그인</a>
        <a class="btn btn-secondary" href="./index.html">메인</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./knson-core.js?v=20260310-1"></script>
  <script src="./general-register.js?v=20260310-1"></script>
</body>
</html>
