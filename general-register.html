<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부직센 | 매물 정보 입력</title>
  <meta name="supabase-url" content="" />
  <meta name="supabase-anon-key" content="" />
  <link rel="stylesheet" href="./general-register.css?v=20260316-ui1" />
</head>
<body>

<canvas id="bgCanvas"></canvas>

  <header class="topbar">
    <div class="brand">
      <!-- buypage 로고마크와 동일한 스타일 -->
      <div class="dot">부</div>
      <div>
        <div class="brand-title">부동산 직매입 센터 | 부직센</div>
        <div class="brand-sub">당사는 중개업체가 아닙니다. 부동산을 직접 매입합니다.</div>
      </div>
    </div>
    <nav class="actions">
      <button id="themeToggle" class="btn btn-secondary" title="테마 전환" aria-label="테마 전환">🌙 다크</button>
    </nav>
  </header>

  <main class="wrap">

    <!-- ── 입력 폼 ── -->
    <section id="viewForm" class="card">
      <h1 class="h1">매물 정보 입력</h1>
      <p class="muted">
        당사는 중개업체가 아닙니다.
        <strong>직접 매입</strong>하기에 등록하신 매물 정보는 절대 <strong>유출</strong>되지 않습니다.
      </p>

      <form id="generalForm" class="form">

        <!-- 등록자 유형 -->
        <div class="field full type-switch" role="radiogroup" aria-label="등록자 유형">
          <span>등록자 유형 *</span>
          <div class="type-options">
            <label class="type-card is-active">
              <input type="radio" name="submitterKind" value="realtor" checked />
              <strong>공인중개사</strong>
              <small>공인중개사 관련 등록물</small>
            </label>
            <label class="type-card">
              <input type="radio" name="submitterKind" value="owner" />
              <strong>소유자 / 일반</strong>
              <small>공인중개사와 관련없는 일반 등록물</small>
            </label>
          </div>
        </div>

        <!-- 주소 -->
        <label class="field full">
          <span>주소 *</span>
          <input name="address" type="text" required placeholder="예: 서울특별시 강남구 역삼동 ..." />
        </label>

        <!-- 세부유형 / 매매가 -->
        <div class="grid2 full">
          <label class="field">
            <span>세부유형 *</span>
            <input name="assetType" type="text" required placeholder="예: 아파트, 오피스텔, 근린생활시설" />
          </label>
          <label class="field">
            <span>매매가(원) *</span>
            <input name="priceMain" type="number" min="0" step="10000" required placeholder="예: 580000000" />
          </label>
        </div>

        <!-- 층 / 사용승인일 -->
        <div class="grid3 full">
          <label class="field">
            <span>해당층</span>
            <input name="floor" type="text" placeholder="예: 5 / B1" />
          </label>
          <label class="field">
            <span>총층</span>
            <input name="totalfloor" type="text" placeholder="예: 15" />
          </label>
          <label class="field">
            <span>사용승인일</span>
            <input name="useapproval" type="date" />
          </label>
        </div>

        <!-- 면적 -->
        <div class="grid3 full">
          <label class="field">
            <span>공용면적(평)</span>
            <input name="commonarea" type="number" min="0" step="0.01" placeholder="예: 10.52" />
          </label>
          <label class="field">
            <span>전용면적(평)</span>
            <input name="exclusivearea" type="number" min="0" step="0.01" placeholder="예: 18.34" />
          </label>
          <label class="field">
            <span>토지면적(평)</span>
            <input name="sitearea" type="number" min="0" step="0.01" placeholder="예: 42.10" />
          </label>
        </div>

        <!-- 중개사 정보 -->
        <section class="sub-section full" id="realtorFields">
          <h2>중개사 정보</h2>
          <div class="grid2">
            <label class="field">
              <span>중개사무소명 *</span>
              <input name="realtorname" type="text" placeholder="예: 한빛공인중개사사무소" />
            </label>
            <label class="field">
              <span>유선전화</span>
              <input name="realtorphone" type="tel" placeholder="예: 02-1234-5678" />
            </label>
          </div>
          <div class="grid2" style="margin-top:14px;">
            <label class="field">
              <span>휴대폰번호 *</span>
              <input name="realtorcell" type="tel" placeholder="010-0000-0000" />
            </label>
          </div>
        </section>

        <!-- 소유자 / 일반 -->
        <section class="sub-section full hidden" id="ownerFields">
          <h2>소유자 / 일반 등록자 정보</h2>
          <div class="grid2">
            <label class="field">
              <span>이름 *</span>
              <input name="submitterName" type="text" placeholder="예: 홍길동" />
            </label>
            <label class="field">
              <span>연락처 *</span>
              <input name="submitterPhone" type="tel" placeholder="010-0000-0000" />
            </label>
          </div>
        </section>

        <!-- 의견 -->
        <label class="field full">
          <span>의견</span>
          <textarea name="opinion" rows="4" placeholder="추가 설명이 있으면 입력해 주세요."></textarea>
        </label>

        <!-- 액션 버튼 -->
        <div class="row full form-actions-row">
          <a class="btn btn-ghost btn-back-inline" href="./buypage.html">&lt; 이전</a>
          <button id="btnSubmit" type="submit" class="btn btn-primary">등록 요청하기</button>
        </div>

        <div id="msg" class="msg" role="status" aria-live="polite"></div>
      </form>
    </section>

    <!-- ── 완료 화면 ── -->
    <section id="viewDone" class="card done hidden">
      <div class="check">✓</div>
      <h2>등록이 접수되었습니다</h2>
      <p style="color:var(--muted);font-size:14px;">검토 후 연락드리겠습니다.</p>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./knson-core.js?v=20260316-ui1"></script>
  <script src="./general-register.js?v=20260316-ui1"></script>

  <!-- ── 테마 토글 ── -->
  <script>
  (() => {
    const html   = document.documentElement;
    const btn    = document.getElementById('themeToggle');
    const DARK   = 'dark';
    const LS_KEY = 'bujiksen-theme';

    // 저장된 테마 또는 시스템 선호도로 초기화
    const saved = localStorage.getItem(LS_KEY);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initDark = saved ? saved === DARK : prefersDark;

    function apply(isDark) {
      html.setAttribute('data-theme', isDark ? 'dark' : 'light');
      btn.textContent = isDark ? '☀️ 라이트' : '🌙 다크';
      localStorage.setItem(LS_KEY, isDark ? 'dark' : 'light');
    }

    apply(initDark);
    btn.addEventListener('click', () => {
      apply(html.getAttribute('data-theme') !== DARK);
    });
  })();
  </script>

  <!-- ── 빅데이터 네트워크 캔버스 배경 ── -->
  <script>
  (() => {
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');
    const NODE_COUNT = 72;
    const CONNECT_DIST = 160;
    const nodes = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // CSS 변수로 색상 읽기 (테마 전환 반영)
    function getCSSVar(v) {
      return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
    }

    // 노드 초기화
    for (let i = 0; i < NODE_COUNT; i++) {
      nodes.push({
        x:  Math.random() * window.innerWidth,
        y:  Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r:  Math.random() * 2.2 + 1.2,
        // 일부 노드는 숫자/텍스트 레이블
        label: Math.random() < 0.22
          ? ['AI', 'ML', 'DB', '₩', '%', '↑', '→'][Math.floor(Math.random()*7)]
          : null,
      });
    }

    // 헥스 → rgba 변환 헬퍼
    function hexToRgba(hex, a) {
      hex = hex.replace('#','');
      if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
      const r = parseInt(hex.slice(0,2),16);
      const g = parseInt(hex.slice(2,4),16);
      const b = parseInt(hex.slice(4,6),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 테마에 따른 색상
      const isDark   = document.documentElement.getAttribute('data-theme') === 'dark';
      const nodeCol  = isDark ? 'rgba(232,87,26,0.55)'  : 'rgba(232,87,26,0.40)';
      const lineCol  = isDark ? 'rgba(232,87,26,0.13)'  : 'rgba(232,87,26,0.10)';
      const glowCol  = isDark ? 'rgba(232,87,26,0.18)'  : 'rgba(232,87,26,0.12)';
      const labelCol = isDark ? 'rgba(245,200,170,0.45)': 'rgba(140,60,10,0.35)';

      // 엣지(연결선)
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < CONNECT_DIST) {
            const alpha = (1 - d / CONNECT_DIST);
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = lineCol.replace(/[\d.]+\)$/, `${(alpha * (isDark?0.18:0.12)).toFixed(3)})`);
            ctx.lineWidth   = alpha * 1.1;
            ctx.stroke();
          }
        }
      }

      // 노드
      nodes.forEach(n => {
        // glow
        const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 6);
        grd.addColorStop(0, glowCol);
        grd.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 6, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // 코어
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = nodeCol;
        ctx.fill();

        // 레이블
        if (n.label) {
          ctx.font = `700 10px 'Montserrat', sans-serif`;
          ctx.fillStyle = labelCol;
          ctx.fillText(n.label, n.x + n.r + 3, n.y + 4);
        }
      });

      // 위치 업데이트 + 벽 반사
      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > canvas.width)  n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
      });

      requestAnimationFrame(draw);
    }

    draw();
  })();
  </script>
</body>
</html>
