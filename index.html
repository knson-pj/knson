<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부동산 매입 관리 시스템</title>
  <meta name="supabase-url" content="" />
  <meta name="supabase-anon-key" content="" />

  <!-- 카카오 JavaScript 키 (Kakao Developers에서 발급) -->
  <meta name="kakao-app-key" content="e204b35f2325614977f2ae1eb673695d" />

  <!-- 로그인 전 메인 화면이 잠깐 보이는 현상(FOUC) 방지 -->
  <style>
    html{visibility:hidden;}
  </style>
  <script>
    (function(){
      try {
        var raw = null;
        try { raw = sessionStorage.getItem('knson_bms_session_v1'); } catch(e) {}
        // 과거 버전 세션 정리(브라우저 재접속 자동로그인 방지)
        try { localStorage.removeItem('knson_bms_session_v1'); } catch(e) {}
        var s = raw ? JSON.parse(raw) : null;
        if (!s || !s.token || !s.user) {
          location.replace('./login.html?next=' + encodeURIComponent('./index.html'));
          return;
        }
      } catch(e) {
        location.replace('./login.html?next=' + encodeURIComponent('./index.html'));
        return;
      }
      document.documentElement.style.visibility = 'visible';
    })();
  </script>

  <link rel="stylesheet" href="./styles.css?v=20260313-ui2" />
</head>
<body>

    <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <img class="logo" src="./image/logo-main.png" alt="HMK" />
      </div>

      <div class="topbar-right">
        <a class="admin-link" href="./admin-index.html">관리자 페이지</a>
        <button id="btnLogout" class="btn-logout" type="button">로그아웃</button>
      </div>
        </div>
  </header>



  <div class="page">
    <section class="page-hero" aria-label="대시보드 헤더">
      <div class="page-hero-badge">• LIVE · PORTFOLIO · DASHBOARD</div>
      <h1 class="page-hero-title">매입 부동산 관리 현황</h1>
      <p class="page-hero-sub">누적 · 경매 · 공매 · 중개 · 일반 물건과 담당자 배당 현황을 한눈에 확인합니다.</p>
    </section>

    <section class="kpi" aria-label="요약 카드">
      <button id="statTotalCard" class="kpi-card kpi-total" type="button">
        <div class="kpi-big" id="statTotal">0</div>
        <div class="kpi-sub">누적</div>
      </button>

      <button id="statAuctionCard" class="kpi-card kpi-auction" type="button">
        <div class="kpi-label">경매</div>
        <div class="kpi-num" id="statAuction">0</div>
      </button>

      <button id="statGongmaeCard" class="kpi-card kpi-gongmae" type="button">
        <div class="kpi-label">공매</div>
        <div class="kpi-num" id="statGongmae">0</div>
      </button>

      <button id="statRealtorCard" class="kpi-card kpi-realtor" type="button">
        <div class="kpi-label">중개</div>
        <div class="kpi-num" id="statRealtor">0</div>
      </button>

      <button id="statGeneralCard" class="kpi-card kpi-general" type="button">
        <div class="kpi-label">일반</div>
        <div class="kpi-num" id="statGeneral">0</div>
      </button>
    </section>
<section class="agent-chart-panel" aria-label="담당자 배당 물건수">
      <div class="agent-chart-head">
        <div class="agent-chart-head-right">
          <div class="agent-chart-legend-head" aria-label="범례">
            <span class="legend-item"><span class="legend-swatch legend-auction"></span>경매</span>
            <span class="legend-item"><span class="legend-swatch legend-onbid"></span>공매</span>
            <span class="legend-item"><span class="legend-swatch legend-realtor"></span>중개</span>
            <span class="legend-item"><span class="legend-swatch legend-general"></span>일반</span>
          </div>
          <span id="agentChartMeta" class="agent-chart-meta-chip">0명</span>
        </div>
      </div>
      <div id="agentChart" class="agent-chart"></div>
      <div id="agentChartEmpty" class="agent-chart-empty hidden">표시할 담당자 배당 데이터가 없습니다.</div>
    </section>

    <section id="filterPanel" class="search-toolbar" data-always-visible="true" aria-hidden="false">
      <div class="search-toolbar-search">
        <input id="searchKeyword" class="input" type="text" placeholder="주소 / 담당자 / 지역 / 의견 검색" />
      </div>
      <div class="search-toolbar-view" aria-label="보기 전환">
        <div class="tabs" role="tablist" aria-label="텍스트/지도">
          <button id="tabText" class="tab is-active" role="tab" aria-selected="true" type="button" title="텍스트 보기">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14M5 12h14M5 17h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span class="sr-only">텍스트 보기</span>
          </button>
          <button id="tabMap" class="tab" role="tab" aria-selected="false" type="button" title="지도 보기">
            <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5 9 4l6 2.5L20 4v13.5L15 20l-6-2.5L4 20V6.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 4v13.5M15 6.5V20" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            <span class="sr-only">지도 보기</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Text view -->
    <main class="content">
      <section id="textView" class="text-view">
        <div id="emptyState" class="empty hidden">등록된 물건이 없습니다.</div>

        <div class="table-wrap">
          <table id="mainPropertiesTable" class="table table-fixed">
            <thead>
              <tr>
                <th>구분</th>
                <th>진행상태</th>
                <th>주소</th>
                <th>유형</th>
                <th>층수</th>
                <th>총층</th>
                <th>사용승인일</th>
                <th>전용면적<br/>(평)</th>
                <th>감정가<br/>(매각가)</th>
                <th>현재가격</th>
                <th>비율</th>
                <th>주요일정</th>
                <th>위치보기</th>
                <th>등록일</th>
                <th>담당자</th>
                <th>권리분석</th>
                <th>현장실사</th>
                <th>의견</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="mainPagination" class="pager"></div>
      </section>

      <!-- Map view -->
      <section id="mapView" class="map-view hidden"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./knson-core.js?v=20260310-1"></script>
  <script src="./app.js?v=20260313-mainrefine2"></script>
</body>
</html>
