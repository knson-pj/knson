<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부동산 매입 관리 시스템</title>
  <meta name="supabase-url" content="" />
  <meta name="supabase-anon-key" content="" />

  <!-- 카카오 JavaScript 키 (Kakao Developers에서 발급) -->
  <meta name="kakao-app-key" content="e204b35f2325614977f2ae1eb673695d" />

  <!-- 로그인 전 메인 화면이 잠깐 보이는 현상(FOUC) 방지 -->
  <style>
    html{visibility:hidden;}
  </style>
  <script>
    (function(){
      try {
        var raw = null;
        try { raw = sessionStorage.getItem('knson_bms_session_v1'); } catch(e) {}
        // 과거 버전 세션 정리(브라우저 재접속 자동로그인 방지)
        try { localStorage.removeItem('knson_bms_session_v1'); } catch(e) {}
        var s = raw ? JSON.parse(raw) : null;
        if (!s || !s.token || !s.user) {
          location.replace('./login.html?next=' + encodeURIComponent('./index.html'));
          return;
        }
      } catch(e) {
        location.replace('./login.html?next=' + encodeURIComponent('./index.html'));
        return;
      }
      document.documentElement.style.visibility = 'visible';
    })();
  </script>

  <link rel="stylesheet" href="./styles.css?v=20260319-map" />
  <link rel="stylesheet" href="./map-view.css?v=20260319-map" />
</head>
<body>

    <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <img class="logo" src="./image/logo-main.png" alt="HMK" />
      </div>

      <div class="topbar-right">
        <div class="view-tabs" role="tablist">
          <button id="tabText" class="view-tab is-active" role="tab" type="button">통계 보기</button>
          <button id="tabMap" class="view-tab" role="tab" type="button">지도 보기</button>
        </div>
        <a class="admin-link" href="./admin-index.html">관리자 페이지</a>
        <button id="btnLogout" class="btn-logout" type="button">로그아웃</button>
      </div>
        </div>
  </header>



  <div class="page">
    <section class="page-hero" aria-label="대시보드 헤더">
      <div class="page-hero-badge">• LIVE · PORTFOLIO · DASHBOARD</div>
      <h1 class="page-hero-title">DB통계</h1>
      <p class="page-hero-sub">저장·입력된 데이터를 통계로 확인합니다.</p>
    </section>

    <section class="kpi" aria-label="요약 카드">
      <button id="statTotalCard" class="kpi-card kpi-total" type="button">
        <div class="kpi-big" id="statTotal">0</div>
        <div class="kpi-sub">누적</div>
      </button>

      <button id="statAuctionCard" class="kpi-card kpi-auction" type="button">
        <div class="kpi-label">경매</div>
        <div class="kpi-num" id="statAuction">0</div>
      </button>

      <button id="statGongmaeCard" class="kpi-card kpi-gongmae" type="button">
        <div class="kpi-label">공매</div>
        <div class="kpi-num" id="statGongmae">0</div>
      </button>

      <button id="statRealtorCard" class="kpi-card kpi-realtor" type="button">
        <div class="kpi-label">중개</div>
        <div class="kpi-num" id="statRealtor">0</div>
      </button>

      <button id="statGeneralCard" class="kpi-card kpi-general" type="button">
        <div class="kpi-label">일반</div>
        <div class="kpi-num" id="statGeneral">0</div>
      </button>
    </section>
<section class="agent-chart-panel" aria-label="담당자 배당 물건수">
      <div class="agent-chart-head">
        <div class="agent-chart-head-right">
          <div class="agent-chart-legend-head" aria-label="범례">
            <span class="legend-item"><span class="legend-swatch legend-auction"></span>경매</span>
            <span class="legend-item"><span class="legend-swatch legend-onbid"></span>공매</span>
            <span class="legend-item"><span class="legend-swatch legend-realtor"></span>중개</span>
            <span class="legend-item"><span class="legend-swatch legend-general"></span>일반</span>
          </div>
          <span id="agentChartMeta" class="agent-chart-meta-chip">0명</span>
        </div>
      </div>
      <div id="agentChart" class="agent-chart"></div>
      <div id="agentChartEmpty" class="agent-chart-empty hidden">표시할 담당자 배당 데이터가 없습니다.</div>
    </section>

    <!-- Stats / Map views -->
    <main class="content">
      <section id="textView" class="stats-view">

        <!-- 물건 DB 유입 현황 -->
        <div class="stat-panel">
          <div class="stat-panel-head">
            <h3 class="stat-panel-title">물건 DB 유입 현황</h3>
            <div class="stat-period-tabs" id="inflowTabs">
              <button class="stat-period-tab is-active" data-period="day" type="button">일간</button>
              <button class="stat-period-tab" data-period="week" type="button">주간</button>
              <button class="stat-period-tab" data-period="month" type="button">월간</button>
              <button class="stat-period-tab" data-period="year" type="button">연간</button>
            </div>
          </div>
          <div class="stat-chart-area" id="inflowChart"></div>
        </div>

        <!-- 분포 차트 그리드 -->
        <div class="stat-grid">
          <div class="stat-panel">
            <h3 class="stat-panel-title">구분별 분포</h3>
            <div id="sourceDistChart" class="stat-chart-area"></div>
          </div>
          <div class="stat-panel">
            <h3 class="stat-panel-title">지역별 분포 (상위 10)</h3>
            <div id="regionDistChart" class="stat-chart-area"></div>
          </div>
          <div class="stat-panel">
            <h3 class="stat-panel-title">유형별 분포 (상위 8)</h3>
            <div id="typeDistChart" class="stat-chart-area"></div>
          </div>
          <div class="stat-panel">
            <h3 class="stat-panel-title">가격대별 분포</h3>
            <div id="priceDistChart" class="stat-chart-area"></div>
          </div>
        </div>

      </section>

      <!-- Map view -->
      <section id="mapView" class="map-view hidden">
        <!-- Sidebar -->
        <aside class="mv-sidebar" id="mvSidebar">
          <div class="mv-sb-head">
            <div class="mv-sb-search">
              <input id="mvKeyword" class="mv-input" type="text" placeholder="주소 / 담당자 / 지역 검색" />
            </div>
            <div class="mv-sb-filters">
              <select id="mvSourceFilter" class="mv-sel">
                <option value="">전체 구분</option>
                <option value="auction">경매</option>
                <option value="onbid">공매</option>
                <option value="realtor">중개</option>
                <option value="general">일반</option>
              </select>
              <select id="mvStatusFilter" class="mv-sel">
                <option value="">전체 상태</option>
                <option value="active">진행중</option>
                <option value="hold">보류</option>
                <option value="closed">종결</option>
                <option value="review">검토중</option>
              </select>
            </div>
          </div>
          <div class="mv-sb-list" id="mvPropertyList"></div>
          <div class="mv-sb-summary" id="mvSummary"></div>
        </aside>

        <!-- Map area -->
        <div class="mv-map-area">
          <div id="kakaoMap" class="mv-kakao-map"></div>
          <div id="mapHint" class="map-hint hidden"></div>

          <!-- Legend -->
          <div class="mv-legend">
            <div class="mv-legend-section">
              <div class="mv-legend-title">구분</div>
              <div class="mv-legend-items">
                <span class="mv-legend-item"><span class="mv-legend-cir" style="background:#D778F7"></span>경매</span>
                <span class="mv-legend-item"><span class="mv-legend-cir" style="background:#59A7FF"></span>공매</span>
                <span class="mv-legend-item"><span class="mv-legend-cir" style="background:#4AD8BA"></span>중개</span>
                <span class="mv-legend-item"><span class="mv-legend-cir" style="background:#F6B04A"></span>일반</span>
              </div>
            </div>
          </div>

          <!-- Zoom -->
          <div class="mv-zoom">
            <button class="mv-zoom-btn" id="mvZoomIn" type="button">+</button>
            <button class="mv-zoom-btn" id="mvZoomOut" type="button">−</button>
          </div>
        </div>

        <!-- Detail popup -->
        <div class="mv-detail hidden" id="mvDetail">
          <div class="mv-detail-head">
            <div class="mv-detail-grade" id="mvDetailGrade"></div>
            <button class="mv-detail-close" id="mvDetailClose" type="button">✕</button>
          </div>
          <div class="mv-detail-body" id="mvDetailBody"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./knson-core.js?v=20260319-stat"></script>
  <script src="./app.js?v=20260319-stat"></script>
</body>
</html>
